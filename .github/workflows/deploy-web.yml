name: Build Fluxa Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Drift web assets
        run: dart run drift_dev web

      - name: Analyze
        run: flutter analyze

      - name: Build web
        run: flutter build web --base-href /app/

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluxa-web-build
          path: build/web
